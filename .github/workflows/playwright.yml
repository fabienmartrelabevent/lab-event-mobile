name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lab-event-mobile/lab-event-mobile
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 18
    - name: Install dependencies
      run: |
        npm install
        npm install @playwright/test
        npx playwright install --with-deps
    - name: Run Playwright tests
      env:
        # Le serveur va chercher tes secrets et les donne temporairement au script
        PLAYWRIGHT_SUBDOMAIN: ${{ secrets.MY_SUBDOMAIN }}
        PLAYWRIGHT_TOKEN: ${{ secrets.MY_TOKEN }}
      run: |
        npx playwright test tests/recette.spec.ts
